<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mon Récap' Spotify</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Votre fichier de style personnalisé -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Header -->
<header class="bg-primary text-white text-center py-4 ">
    <h1>Mon Récap' Spotify</h1>
</header>


<div class="Chart">
    <div class="chart_types">
        <button onclick="setChartType('bar')">Bars</button>
        <button onclick="setChartType('line')">Line</button>
        <button onclick="setChartType('doughnut')">Doughnut</button>
        <button onclick="setChartType('polarArea')">PolarArea</button>
        <button onclick="setChartType('radar')">Radar</button>

    </div>
    <canvas id="myChart" ></canvas>
  </div>

<div class="card" style="width: 18rem;">
<img src="..." class="card-img-top" alt="...">
<div class="card-body">
<h5 class="card-title">Card title</h5>
<p class="card-text">Some quick example text to build on the card title and make up the bulk of the card's content.</p>
<a href="#" class="btn btn-primary">Go somewhere</a>
</div>
</div>


<p id="noms"></p>
<p id="images"></p>
<p id="artistes"></p>
<p id="ensemble"></p>
<p id="popularity"></p>


<!-- Footer -->
<footer class="bg-dark text-white text-center py-3">
    <div class="container">
        <ul class="list-inline">
            <li class="list-inline-item"><a href="#">Mentions légales</a></li>
            <li class="list-inline-item"><a href="#">Politique de confidentialité</a></li>
            <li class="list-inline-item"><a href="#">À propos</a></li>
            <li class="list-inline-item"><a href="#">Contact</a></li>
        </ul>
    </div>
</footer>

<!-- Bootstrap JS (optionnel si vous utilisez les composants JavaScript) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.min.js" integrity="sha512-L0Shl7nXXzIlBSUUPpxrokqq4ojqgZFQczTYlGjzONGTDAcLremjwaWv5A+EDLnxhQzY5xUZPWLOLqYRkY0Cbw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>



</body>
</html>
